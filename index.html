    <style>
        :root {
            --primary-bg: #fdfdfd;
            --secondary-bg: #f4f6f8;
            --accent-purple: #5b54a3;
            --text-dark: #333;
            --text-gray: #777;
            --border-color: #e0e0e0;
            --orange-status: #f39c12;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        .checkout-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* قسم المبالغ */
        .summary-box {
            background-color: var(--secondary-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .total-title {
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0 5px 0;
        }

        .total-amount {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .amount-literal {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* قسم الدفع بالبطاقة */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .payment-methods {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .payment-methods img {
            height: 24px;
            opacity: 0.8;
        }

        .apple-pay-box {
            border: 2px solid #2ecc71; /* الإطار الأخضر كما في الصورة */
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
        }

        .btn-pay {
            width: 100%;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn-pay:hover {
            background-color: #4a448a;
        }

        /* قسم سداد */
        .sadad-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .sadad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .sadad-logo {
            height: 25px;
        }

        .sadad-info-box {
            font-size: 14px;
            line-height: 2;
        }

        .info-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .label { color: #666; min-width: 100px; }
        .value { font-weight: 600; }

        .status-badge {
            background-color: #fff9e6;
            color: var(--orange-status);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ffeeba;
            margin-right: 10px;
        }

    </style>
</head>

<div class="checkout-card">
    <div class="summary-box">

        </div>
        <div class="total-title">المجموع الكلي</div>

        <div class="amount-literal">
            ألف وسبعمائة وخمسة وسبعون ريال سعودي وصفر هللات فقط

    </div>

    <label class="section-title">الدفع عن طريق البطاقة</label>
    <div class="payment-methods">
        <img src="Visa_Inc._logo.png" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">

            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Apple_Pay_logo.svg" alt="Apple Pay">

        <img src="SADAD-Logo.png" class="sadad-logo" alt="SADAD">
    </div>
