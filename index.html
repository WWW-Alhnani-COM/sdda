    <style>
        :root {
            --primary-bg: #fdfdfd;
            --secondary-bg: #f4f6f8;
            --accent-purple: #5b54a3;
            --text-dark: #333;
            --text-gray: #777;
            --border-color: #e0e0e0;
            --orange-status: #f39c12;
        }

body {
    font-family: 'Tajawal', sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    color: var(--text-dark);
    padding: 20px;
}

      .checkout-card {
    background: white;
    width: 100%;
    max-width: 450px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    box-sizing: border-box;
}

        /* قسم المبالغ */
        .summary-box {
            background-color: var(--secondary-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .total-title {
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0 5px 0;
        }

        .total-amount {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .amount-literal {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* قسم الدفع بالبطاقة */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .payment-methods {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .payment-methods img {
            height: 24px;
            opacity: 0.8;
        }

        .apple-pay-box {
          height: 10px;
            opacity: 0.8;
        }

        .btn-pay {
            width: 100%;
 background-color: #000; 
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn-pay:hover {
            background-color: white;
                        color: #000 ;
             border: 1px solid #000; /* البوردر أسود */
    border-radius: 8px;

        }

        /* قسم سداد */
        .sadad-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .sadad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .sadad-logo {
            height: 25px;
        }

        .sadad-info-box {
            font-size: 14px;
            line-height: 2;
        }

        .info-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .label { color: #666; min-width: 100px; }
        .value { font-weight: 600; }

        .status-badge {
            background-color: #fff9e6;
            color: var(--orange-status);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ffeeba;
            margin-right: 10px;
        }
        .currency-icon {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: 6px;
    object-fit: contain;
}
/* تابلت */
@media (max-width: 768px) {
    .checkout-card {
        max-width: 100%;
        padding: 20px;
    }

    .total-amount {
        font-size: 22px;
    }

    .btn-pay {
        font-size: 15px;
        padding: 12px;
    }
}

/* موبايل صغير */
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .checkout-card {
        padding: 15px;
        border-radius: 10px;
    }

    .summary-box {
        padding: 15px;
    }

    .total-title {
        font-size: 18px;
    }

    .total-amount {
        font-size: 20px;
    }

    .amount-literal {
        font-size: 11px;
    }

    .payment-methods {
        gap: 8px;
        flex-wrap: wrap;
    }

    .payment-methods img {
        height: 20px;
    }

    .btn-pay {
        font-size: 14px;
    }
}

<script>
function handleCardPayment(btn) {
    btn.innerText = "جاري التحويل...";
    btn.disabled = true;

    window.open(
        "https://business.neoleap.com.sa/pg-pay-links/invoice?id=pB1SF65fP7kT9C3jlQBsePggY8yW6gGmWrjmdmrsuuatZy6Q4nkfZDM9gZIXwUp",
        "_blank",
        "noopener,noreferrer"
    );

    setTimeout(function() {
        btn.innerText = "ادفع عن طريق البطاقة";
        btn.disabled = false;
    }, 3000);
}
